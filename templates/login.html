<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.site_name }} - Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-icon">🔐</div>
            <div class="auth-title">{{ config.site_name }}</div>
            <div class="auth-subtitle">{{ config.site_tagline }}</div>

            <form method="POST" action="/login" id="loginForm">
                <div class="auth-input-group">
                    <input type="text" name="username" class="auth-input" placeholder="Username" required autocomplete="off">
                </div>
                <div class="auth-input-group">
                    <input type="password" name="password" class="auth-input" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-btn">🔓 Login</button>
            </form>

            {% if error %}
            <div class="auth-error show">{{ error }}</div>
            {% endif %}

            <div class="auth-divider">or</div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/signup">Sign Up</a></p>
                <p style="margin-top: 8px; font-size: 12px; color: var(--muted);">Admin: admin / shadowadmin749926n</p>
            </div>
        </div>
    </div>
</body>
</html>
