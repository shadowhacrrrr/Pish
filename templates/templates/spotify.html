<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .tpl-page-spotify {
            background: #121212;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Circular', 'Helvetica Neue', sans-serif;
        }
        .tpl-card-spotify {
            background: #121212;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: none;
            border: none;
        }
        .tpl-logo-spotify {
            width: 50px;
            height: 50px;
            background: #1db954;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #1db954;
            font-weight: 400;
            margin: 0 auto 20px;
            
        }
        .tpl-title-spotify {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            
        }
        .tpl-subtitle-spotify {
            text-align: center;
            color: #b3b3b3;
            font-size: 16px;
            margin-bottom: 25px;
        }
        .tpl-input-spotify {
            width: 100%;
            padding: 14px;
            background: #2a2a2a;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s ease;
            
        }
        .tpl-input-spotify:focus {
            border-color: #1db954;
            box-shadow: 0 0 0 3px #1db95430;
        }
        .tpl-btn-spotify {
            width: 100%;
            padding: 14px;
            background: #1db954;
            border: none;
            border-radius: 500px;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            
        }
        .tpl-btn-spotify:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .tpl-footer-spotify {
            text-align: center;
            margin-top: 20px;
            color: #b3b3b3;
            font-size: 14px;
        }
        .tpl-footer-spotify a {
            color: #1db954;
            text-decoration: none;
        }
        .tpl-divider-spotify {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #b3b3b3;
            font-size: 13px;
        }
        .tpl-divider-spotify::before,
        .tpl-divider-spotify::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2a2a2a;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="tpl-page-spotify">
        <div class="tpl-card-spotify">
            <div class="tpl-logo-spotify">🎧</div>
            <div class="tpl-title-spotify">Spotify</div>
            <div class="tpl-subtitle-spotify">Music for everyone.</div>

            <form onsubmit="handleSubmit(event)">
                <input type="text" class="tpl-input-spotify" placeholder="Email or username" required>
<input type="password" class="tpl-input-spotify" placeholder="Password" required>

                <button type="submit" class="tpl-btn-spotify">Sign In</button>
            </form>

            <div class="tpl-divider-spotify">or</div>

            <div class="tpl-footer-spotify">
                <p>Don't have an account? <a href="#">Sign up</a></p>
                <p style="margin-top: 10px;"><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;

            setTimeout(() => {
                btn.textContent = originalText;
                btn.disabled = false;
                alert('This is a demo template. Data captured successfully!');
            }, 1500);
        }
    </script>
</body>
</html>
