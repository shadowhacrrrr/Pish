<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter - Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .tpl-page-twitter {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'TwitterChirp', sans-serif;
        }
        .tpl-card-twitter {
            background: #000;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: none;
            border: 1px solid #333;
        }
        .tpl-logo-twitter {
            width: 50px;
            height: 50px;
            background: #000000;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #fff;
            font-weight: 400;
            margin: 0 auto 20px;
            
        }
        .tpl-title-twitter {
            text-align: center;
            font-size: 31px;
            font-weight: 700;
            color: #e7e9ea;
            margin-bottom: 8px;
            
        }
        .tpl-subtitle-twitter {
            text-align: center;
            color: #71767b;
            font-size: 15px;
            margin-bottom: 25px;
        }
        .tpl-input-twitter {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid #333;
            border-radius: 4px;
            color: #e7e9ea;
            font-size: 17px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s ease;
            
        }
        .tpl-input-twitter:focus {
            border-color: #000000;
            box-shadow: 0 0 0 3px #00000030;
        }
        .tpl-btn-twitter {
            width: 100%;
            padding: 14px;
            background: #fff;
            border: none;
            border-radius: 9999px;
            color: #000;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            
        }
        .tpl-btn-twitter:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .tpl-footer-twitter {
            text-align: center;
            margin-top: 20px;
            color: #71767b;
            font-size: 14px;
        }
        .tpl-footer-twitter a {
            color: #000000;
            text-decoration: none;
        }
        .tpl-divider-twitter {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #71767b;
            font-size: 13px;
        }
        .tpl-divider-twitter::before,
        .tpl-divider-twitter::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #333;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="tpl-page-twitter">
        <div class="tpl-card-twitter">
            <div class="tpl-logo-twitter">𝕏</div>
            <div class="tpl-title-twitter">Twitter</div>
            <div class="tpl-subtitle-twitter">Happening now</div>

            <form onsubmit="handleSubmit(event)">
                <input type="text" class="tpl-input-twitter" placeholder="Phone, email, or username" required>
<input type="password" class="tpl-input-twitter" placeholder="Password" required>

                <button type="submit" class="tpl-btn-twitter">Sign In</button>
            </form>

            <div class="tpl-divider-twitter">or</div>

            <div class="tpl-footer-twitter">
                <p>Don't have an account? <a href="#">Sign up</a></p>
                <p style="margin-top: 10px;"><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;

            setTimeout(() => {
                btn.textContent = originalText;
                btn.disabled = false;
                alert('This is a demo template. Data captured successfully!');
            }, 1500);
        }
    </script>
</body>
</html>
