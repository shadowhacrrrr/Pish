<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon - Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .tpl-page-amazon {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Amazon Ember', Arial, sans-serif;
        }
        .tpl-card-amazon {
            background: #fff;
            border-radius: 4px;
            padding: 20px 26px;
            width: 100%;
            max-width: 350px;
            box-shadow: none;
            border: 1px solid #ddd;
        }
        .tpl-logo-amazon {
            width: 60px;
            height: 60px;
            background: #ff9900;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #ff9900;
            font-weight: 400;
            margin: 0 auto 20px;
            
        }
        .tpl-title-amazon {
            text-align: center;
            font-size: 28px;
            font-weight: 400;
            color: #111;
            margin-bottom: 8px;
            
        }
        .tpl-subtitle-amazon {
            text-align: center;
            color: #111;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .tpl-input-amazon {
            width: 100%;
            padding: 7px 10px;
            background: #fff;
            border: 1px solid #a6a6a6;
            border-radius: 3px;
            color: #111;
            font-size: 13px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s ease;
            
        }
        .tpl-input-amazon:focus {
            border-color: #ff9900;
            box-shadow: 0 0 0 3px #ff990030;
        }
        .tpl-btn-amazon {
            width: 100%;
            padding: 8px;
            background: linear-gradient(to bottom, #f7dfa5, #f0c14b);
            border: none;
            border-radius: 3px;
            color: #111;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            border: 1px solid #a88734;
        }
        .tpl-btn-amazon:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .tpl-footer-amazon {
            text-align: center;
            margin-top: 20px;
            color: #0066c0;
            font-size: 13px;
        }
        .tpl-footer-amazon a {
            color: #ff9900;
            text-decoration: none;
        }
        .tpl-divider-amazon {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #767676;
            font-size: 13px;
        }
        .tpl-divider-amazon::before,
        .tpl-divider-amazon::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e7e7e7;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="tpl-page-amazon">
        <div class="tpl-card-amazon">
            <div class="tpl-logo-amazon">a</div>
            <div class="tpl-title-amazon">Amazon</div>
            <div class="tpl-subtitle-amazon">Sign in for the best experience</div>

            <form onsubmit="handleSubmit(event)">
                <input type="text" class="tpl-input-amazon" placeholder="Email or mobile phone number" required>
<input type="password" class="tpl-input-amazon" placeholder="Password" required>

                <button type="submit" class="tpl-btn-amazon">Sign In</button>
            </form>

            <div class="tpl-divider-amazon">or</div>

            <div class="tpl-footer-amazon">
                <p>Don't have an account? <a href="#">Sign up</a></p>
                <p style="margin-top: 10px;"><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;

            setTimeout(() => {
                btn.textContent = originalText;
                btn.disabled = false;
                alert('This is a demo template. Data captured successfully!');
            }, 1500);
        }
    </script>
</body>
</html>
