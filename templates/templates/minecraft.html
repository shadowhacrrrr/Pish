<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft - Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .tpl-page-minecraft {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Noto Sans', sans-serif;
        }
        .tpl-card-minecraft {
            background: rgba(26,26,26,0.95);
            border-radius: 0;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: none;
            border: 2px solid #5d8c3a;
        }
        .tpl-logo-minecraft {
            width: 70px;
            height: 70px;
            background: #5d8c3a;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #5d8c3a;
            font-weight: 700;
            margin: 0 auto 20px;
            border: 3px solid #5d8c3a;
        }
        .tpl-title-minecraft {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            
        }
        .tpl-subtitle-minecraft {
            text-align: center;
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .tpl-input-minecraft {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #5d8c3a;
            border-radius: 0;
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s ease;
            
        }
        .tpl-input-minecraft:focus {
            border-color: #5d8c3a;
            box-shadow: 0 0 0 3px #5d8c3a30;
        }
        .tpl-btn-minecraft {
            width: 100%;
            padding: 12px;
            background: #5d8c3a;
            border: none;
            border-radius: 0;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            
        }
        .tpl-btn-minecraft:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .tpl-footer-minecraft {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
        .tpl-footer-minecraft a {
            color: #5d8c3a;
            text-decoration: none;
        }
        .tpl-divider-minecraft {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #aaa;
            font-size: 13px;
        }
        .tpl-divider-minecraft::before,
        .tpl-divider-minecraft::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #5d8c3a;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="tpl-page-minecraft">
        <div class="tpl-card-minecraft">
            <div class="tpl-logo-minecraft">⛏</div>
            <div class="tpl-title-minecraft">Minecraft</div>
            <div class="tpl-subtitle-minecraft">Sign in with Mojang Account</div>

            <form onsubmit="handleSubmit(event)">
                <input type="text" class="tpl-input-minecraft" placeholder="Email" required>
<input type="password" class="tpl-input-minecraft" placeholder="Password" required>

                <button type="submit" class="tpl-btn-minecraft">Sign In</button>
            </form>

            <div class="tpl-divider-minecraft">or</div>

            <div class="tpl-footer-minecraft">
                <p>Don't have an account? <a href="#">Sign up</a></p>
                <p style="margin-top: 10px;"><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;

            setTimeout(() => {
                btn.textContent = originalText;
                btn.disabled = false;
                alert('This is a demo template. Data captured successfully!');
            }, 1500);
        }
    </script>
</body>
</html>
