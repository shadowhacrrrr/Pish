<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call of Duty - Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .tpl-page-callofduty {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
        }
        .tpl-card-callofduty {
            background: #000;
            border-radius: 0;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: none;
            border: 2px solid #f4c430;
        }
        .tpl-logo-callofduty {
            width: 70px;
            height: 70px;
            background: #f4c430;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #f4c430;
            font-weight: 700;
            margin: 0 auto 20px;
            border: 3px solid #f4c430;
        }
        .tpl-title-callofduty {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #f4c430;
            margin-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
        }
        .tpl-subtitle-callofduty {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .tpl-input-callofduty {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 0;
            color: #fff;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s ease;
            
        }
        .tpl-input-callofduty:focus {
            border-color: #f4c430;
            box-shadow: 0 0 0 3px #f4c43030;
        }
        .tpl-btn-callofduty {
            width: 100%;
            padding: 14px;
            background: #f4c430;
            border: none;
            border-radius: 0;
            color: #000;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Orbitron', sans-serif;
        }
        .tpl-btn-callofduty:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .tpl-footer-callofduty {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .tpl-footer-callofduty a {
            color: #f4c430;
            text-decoration: none;
        }
        .tpl-divider-callofduty {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #888;
            font-size: 13px;
        }
        .tpl-divider-callofduty::before,
        .tpl-divider-callofduty::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #333;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="tpl-page-callofduty">
        <div class="tpl-card-callofduty">
            <div class="tpl-logo-callofduty">🔫</div>
            <div class="tpl-title-callofduty">Call of Duty</div>
            <div class="tpl-subtitle-callofduty">Sign in to Call of Duty</div>

            <form onsubmit="handleSubmit(event)">
                <input type="text" class="tpl-input-callofduty" placeholder="Email" required>
<input type="password" class="tpl-input-callofduty" placeholder="Password" required>

                <button type="submit" class="tpl-btn-callofduty">Sign In</button>
            </form>

            <div class="tpl-divider-callofduty">or</div>

            <div class="tpl-footer-callofduty">
                <p>Don't have an account? <a href="#">Sign up</a></p>
                <p style="margin-top: 10px;"><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;

            setTimeout(() => {
                btn.textContent = originalText;
                btn.disabled = false;
                alert('This is a demo template. Data captured successfully!');
            }, 1500);
        }
    </script>
</body>
</html>
