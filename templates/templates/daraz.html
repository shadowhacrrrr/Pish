<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daraz - Sign In</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .tpl-page-daraz {
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Open Sans', sans-serif;
        }
        .tpl-card-daraz {
            background: #fff;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: none;
        }
        .tpl-logo-daraz {
            width: 60px;
            height: 60px;
            background: #f57224;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            color: #f57224;
            font-weight: 700;
            margin: 0 auto 20px;
            
        }
        .tpl-title-daraz {
            text-align: center;
            font-size: 0px;
            font-weight: 0;
            color: transparent;
            margin-bottom: 8px;
            display: none;
        }
        .tpl-subtitle-daraz {
            text-align: center;
            color: #212121;
            font-size: 18px;
            margin-bottom: 25px;
        }
        .tpl-input-daraz {
            width: 100%;
            padding: 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #212121;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
            transition: all 0.3s ease;
            
        }
        .tpl-input-daraz:focus {
            border-color: #f57224;
            box-shadow: 0 0 0 3px #f5722430;
        }
        .tpl-btn-daraz {
            width: 100%;
            padding: 12px;
            background: #f57224;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            
        }
        .tpl-btn-daraz:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .tpl-footer-daraz {
            text-align: center;
            margin-top: 20px;
            color: #1a9cb7;
            font-size: 14px;
        }
        .tpl-footer-daraz a {
            color: #f57224;
            text-decoration: none;
        }
        .tpl-divider-daraz {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
            font-size: 13px;
        }
        .tpl-divider-daraz::before,
        .tpl-divider-daraz::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="tpl-page-daraz">
        <div class="tpl-card-daraz">
            <div class="tpl-logo-daraz">D</div>
            <div class="tpl-title-daraz">Daraz</div>
            <div class="tpl-subtitle-daraz">Sign in to Daraz</div>

            <form onsubmit="handleSubmit(event)">
                <input type="text" class="tpl-input-daraz" placeholder="Phone Number or Email" required>
<input type="password" class="tpl-input-daraz" placeholder="Password" required>

                <button type="submit" class="tpl-btn-daraz">Sign In</button>
            </form>

            <div class="tpl-divider-daraz">or</div>

            <div class="tpl-footer-daraz">
                <p>Don't have an account? <a href="#">Sign up</a></p>
                <p style="margin-top: 10px;"><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;

            setTimeout(() => {
                btn.textContent = originalText;
                btn.disabled = false;
                alert('This is a demo template. Data captured successfully!');
            }, 1500);
        }
    </script>
</body>
</html>
